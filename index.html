<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5-Port Milk Testing Device — Prototype</title>
    <link rel="stylesheet" href="css/tablet.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/modals.css">
</head>
<body>

<div class="device-container">

    <!-- ===== Device Frame ===== -->
    <div class="device-frame">
        <div class="device-screen">

            <!-- Status Bar -->
            <div class="status-bar">
                <div class="sb-left">
                    <span class="sb-brand">MilkSafe&trade;</span>
                </div>
                <div class="sb-center">
                    <span class="sb-temp">
                        <span class="temp-icon">&#x1F321;</span>
                        <span id="status-bar-temp-value">50.0&deg;C</span>
                    </span>
                    <span class="sb-sensor-mode" id="status-bar-microswitch-mode">Micro Switch ON</span>
                    <span class="sb-time" id="status-bar-time">--:--</span>
                </div>
                <div class="sb-right">
                    <button class="sb-nav-btn" id="history-btn" hidden>History</button>
                    <button class="sb-nav-btn" id="settings-open-btn">Settings</button>
                </div>
            </div>

            <!-- Channel Cards Row -->
            <div class="channels-container">
                <div class="channel-card state-empty" id="card-1"></div>
                <div class="channel-card state-empty" id="card-2"></div>
                <div class="channel-card state-empty" id="card-3"></div>
                <div class="channel-card state-empty" id="card-4"></div>
                <div class="channel-card state-empty" id="card-5"></div>
            </div>

            <!-- Full Screen Settings -->
            <div class="settings-screen" id="settings-screen"></div>
            <div class="history-screen" id="history-screen"></div>

            <!-- Modal Overlay -->
            <div class="modal-overlay" id="modal-overlay">
                <div class="modal config-modal" id="config-modal"></div>
                <div class="modal decision-modal" id="decision-modal"></div>
                <div class="modal detail-modal" id="detail-modal"></div>
            </div>

        </div>
    </div>

    <!-- ===== Physical Slot Visualization ===== -->
    <div class="slot-panel">
        <div class="slot-row">
            <div class="slot-unit" id="slot-1">
                <div class="slot-label">1</div>
                <div class="slot-housing">
                    <div class="slot-opening"></div>
                    <div class="cassette-body" id="cassette-1">
                        <div class="cassette-top-tab"></div>
                        <div class="cassette-window">
                            <div class="cassette-lines" id="cassette-lines-1"></div>
                        </div>
                        <div class="cassette-well"></div>
                    </div>
                </div>
            </div>
            <div class="slot-unit" id="slot-2">
                <div class="slot-label">2</div>
                <div class="slot-housing">
                    <div class="slot-opening"></div>
                    <div class="cassette-body" id="cassette-2">
                        <div class="cassette-top-tab"></div>
                        <div class="cassette-window">
                            <div class="cassette-lines" id="cassette-lines-2"></div>
                        </div>
                        <div class="cassette-well"></div>
                    </div>
                </div>
            </div>
            <div class="slot-unit" id="slot-3">
                <div class="slot-label">3</div>
                <div class="slot-housing">
                    <div class="slot-opening"></div>
                    <div class="cassette-body" id="cassette-3">
                        <div class="cassette-top-tab"></div>
                        <div class="cassette-window">
                            <div class="cassette-lines" id="cassette-lines-3"></div>
                        </div>
                        <div class="cassette-well"></div>
                    </div>
                </div>
            </div>
            <div class="slot-unit" id="slot-4">
                <div class="slot-label">4</div>
                <div class="slot-housing">
                    <div class="slot-opening"></div>
                    <div class="cassette-body" id="cassette-4">
                        <div class="cassette-top-tab"></div>
                        <div class="cassette-window">
                            <div class="cassette-lines" id="cassette-lines-4"></div>
                        </div>
                        <div class="cassette-well"></div>
                    </div>
                </div>
            </div>
            <div class="slot-unit" id="slot-5">
                <div class="slot-label">5</div>
                <div class="slot-housing">
                    <div class="slot-opening"></div>
                    <div class="cassette-body" id="cassette-5">
                        <div class="cassette-top-tab"></div>
                        <div class="cassette-window">
                            <div class="cassette-lines" id="cassette-lines-5"></div>
                        </div>
                        <div class="cassette-well"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== Simulation Control Panel ===== -->
    <div class="simulation-panel">
        <h2>Simulation Controls</h2>
        <div class="sim-subtitle">Simulate cassette insertion and physical removal</div>

        <div class="sim-channels">
            <!-- 1 -->
            <div class="sim-channel" id="sim-1">
                <h3>1</h3>
                <div class="sim-type-select">
                    <span>Type:</span>
                    <select>
                        <option value="43" selected>MilkSafe FAST 3BTS (2.0) | Cassette | QR On | 40 C | 4m</option>
                        <option value="37">MilkSafe FAST 3BTC (2.0) Read | Cassette | QR On</option>
                        <option value="8">MilkSafe 4BTSQ | Strip | QR Off | 50 C | 1m</option>
                        <option value="20">MilkSafe Afla M1 | Strip | QR Off | Quant</option>
                        <option value="57">Bioeasy 3IN1 BST | Strip | QR Off</option>
                    </select>
                </div>
                <div class="sim-buttons">
                    <button class="sim-btn sim-btn-positive">Insert Positive</button>
                    <button class="sim-btn sim-btn-negative">Insert Negative</button>
                    <button class="sim-btn sim-btn-remove" disabled>Remove Cassette</button>
                </div>
            </div>
            <!-- 2 -->
            <div class="sim-channel" id="sim-2">
                <h3>2</h3>
                <div class="sim-type-select">
                    <span>Type:</span>
                    <select>
                        <option value="43" selected>MilkSafe FAST 3BTS (2.0) | Cassette | QR On | 40 C | 4m</option>
                        <option value="37">MilkSafe FAST 3BTC (2.0) Read | Cassette | QR On</option>
                        <option value="8">MilkSafe 4BTSQ | Strip | QR Off | 50 C | 1m</option>
                        <option value="20">MilkSafe Afla M1 | Strip | QR Off | Quant</option>
                        <option value="57">Bioeasy 3IN1 BST | Strip | QR Off</option>
                    </select>
                </div>
                <div class="sim-buttons">
                    <button class="sim-btn sim-btn-positive">Insert Positive</button>
                    <button class="sim-btn sim-btn-negative">Insert Negative</button>
                    <button class="sim-btn sim-btn-remove" disabled>Remove Cassette</button>
                </div>
            </div>
            <!-- 3 -->
            <div class="sim-channel" id="sim-3">
                <h3>3</h3>
                <div class="sim-type-select">
                    <span>Type:</span>
                    <select>
                        <option value="43" selected>MilkSafe FAST 3BTS (2.0) | Cassette | QR On | 40 C | 4m</option>
                        <option value="37">MilkSafe FAST 3BTC (2.0) Read | Cassette | QR On</option>
                        <option value="8">MilkSafe 4BTSQ | Strip | QR Off | 50 C | 1m</option>
                        <option value="20">MilkSafe Afla M1 | Strip | QR Off | Quant</option>
                        <option value="57">Bioeasy 3IN1 BST | Strip | QR Off</option>
                    </select>
                </div>
                <div class="sim-buttons">
                    <button class="sim-btn sim-btn-positive">Insert Positive</button>
                    <button class="sim-btn sim-btn-negative">Insert Negative</button>
                    <button class="sim-btn sim-btn-remove" disabled>Remove Cassette</button>
                </div>
            </div>
            <!-- 4 -->
            <div class="sim-channel" id="sim-4">
                <h3>4</h3>
                <div class="sim-type-select">
                    <span>Type:</span>
                    <select>
                        <option value="43" selected>MilkSafe FAST 3BTS (2.0) | Cassette | QR On | 40 C | 4m</option>
                        <option value="37">MilkSafe FAST 3BTC (2.0) Read | Cassette | QR On</option>
                        <option value="8">MilkSafe 4BTSQ | Strip | QR Off | 50 C | 1m</option>
                        <option value="20">MilkSafe Afla M1 | Strip | QR Off | Quant</option>
                        <option value="57">Bioeasy 3IN1 BST | Strip | QR Off</option>
                    </select>
                </div>
                <div class="sim-buttons">
                    <button class="sim-btn sim-btn-positive">Insert Positive</button>
                    <button class="sim-btn sim-btn-negative">Insert Negative</button>
                    <button class="sim-btn sim-btn-remove" disabled>Remove Cassette</button>
                </div>
            </div>
            <!-- 5 -->
            <div class="sim-channel" id="sim-5">
                <h3>5</h3>
                <div class="sim-type-select">
                    <span>Type:</span>
                    <select>
                        <option value="43" selected>MilkSafe FAST 3BTS (2.0) | Cassette | QR On | 40 C | 4m</option>
                        <option value="37">MilkSafe FAST 3BTC (2.0) Read | Cassette | QR On</option>
                        <option value="8">MilkSafe 4BTSQ | Strip | QR Off | 50 C | 1m</option>
                        <option value="20">MilkSafe Afla M1 | Strip | QR Off | Quant</option>
                        <option value="57">Bioeasy 3IN1 BST | Strip | QR Off</option>
                    </select>
                </div>
                <div class="sim-buttons">
                    <button class="sim-btn sim-btn-positive">Insert Positive</button>
                    <button class="sim-btn sim-btn-negative">Insert Negative</button>
                    <button class="sim-btn sim-btn-remove" disabled>Remove Cassette</button>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- Scripts: state first, then UI, then app controller -->
<script src="js/state.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
